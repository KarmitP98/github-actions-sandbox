name: Create PR to development

# This workflow mirrors a PR targeting `integration` by opening a corresponding
# PR from the same source branch to `development`, copying metadata and avoiding
# duplicates.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    # Only run when the PR's base (target) branch is `integration`.
    branches:
      - integration

jobs:
  create-pr-to-development:
    # Skip the entire job if the source branch indicates it's already intended
    # for integration (e.g., "feature-x-to-int" or "hotfix/for-int").
    if: ${{ !contains(github.head_ref, '-to-int') && !contains(github.head_ref, 'for-int') }}
    runs-on: ubuntu-latest

    # Grant only the minimum required permissions.
    permissions:
      contents: read        # required to read repository data
      pull-requests: write  # required to create PRs and request reviewers
      issues: write         # required to add labels and assignees

    steps:
      # Checkout is not strictly required for API operations, but included
      # as requested and to provide a working copy if needed later.
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create or ensure PR from source to development
        # Use GitHub Script for concise GitHub API interactions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Collect the current PR context
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request context found. Exiting.');
              return;
            }

            // Defensive check: ensure base is integration
            if (pr.base?.ref !== 'integration') {
              core.info(`PR base is '${pr.base?.ref}', not 'integration'. Exiting.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // For cross-fork PRs, head.label is 'forkOwner:branch'; this format
            // is accepted by the create/list PR APIs for the 'head' parameter.
            const headLabel = pr.head.label; // 'ownerOrFork:branch'
            const baseBranch = 'development';

            // Fetch full PR details to ensure complete metadata (labels, assignees, reviewers)
            const { data: fullPr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });

            // Avoid duplicates: check for an existing open PR from the same source branch to 'development'
            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: headLabel, // 'owner:branch'
              base: baseBranch,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Found existing PR #${existing[0].number} from ${headLabel} to ${baseBranch}. Skipping creation.`);
              return;
            }

            // Create the corresponding PR to 'development'
            const { data: newPr } = await github.rest.pulls.create({
              owner,
              repo,
              title: fullPr.title,
              head: headLabel,      // keep same source branch
              base: baseBranch,     // target development
              body: fullPr.body || '',
              draft: !!fullPr.draft,
              maintainer_can_modify: true,
            });

            core.info(`Created PR #${newPr.number} from ${headLabel} to ${baseBranch}.`);

            // Copy labels (best-effort)
            const labels = (fullPr.labels || [])
              .map(l => (typeof l === 'string' ? l : l?.name))
              .filter(Boolean);
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: newPr.number,
                labels,
              });
            }

            // Copy assignees (best-effort)
            const assignees = (fullPr.assignees || []).map(u => u.login);
            if (assignees.length > 0) {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: newPr.number,
                assignees,
              });
            }

            // Copy requested reviewers (users and teams) - best-effort, may fail on forks/permissions
            try {
              const reviewers = (fullPr.requested_reviewers || []).map(u => u.login);
              const team_reviewers = (fullPr.requested_teams || []).map(t => t.slug);
              if (reviewers.length > 0 || team_reviewers.length > 0) {
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number: newPr.number,
                  reviewers,
                  team_reviewers,
                });
              }
            } catch (err) {
              core.warning(`Unable to set reviewers: ${err.message}`);
            }

            core.info('Mirroring to development completed.');


